<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Interview | Vighnarth Nile Digital Twin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f1115;
      --surface-color: #1a1d24;
      --surface-light: #252932;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --success: #10b981;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #2e3340;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Navbar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: var(--surface-color);
      border-bottom: 1px solid var(--border);
      height: 70px;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span {
      color: var(--primary);
    }

    .header-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-badge.connected .status-dot {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    /* Main Workspace */
    .workspace {
      display: flex;
      flex: 1;
      padding: 1.5rem;
      gap: 1.5rem;
      height: calc(100vh - 70px);
    }

    /* Left side - Video/Avatar Area */
    .stage {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .video-container {
      flex: 1;
      background: var(--surface-color);
      border-radius: 16px;
      border: 1px solid var(--border);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      z-index: 2;
    }

    .avatar-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--surface-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-family: 'Outfit';
      font-weight: 700;
      color: var(--text-main);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      position: relative;
      border: 4px solid var(--surface-light);
      transition: all 0.3s ease;
    }

    /* Speaking Animation */
    .agent-is-speaking .avatar-circle {
      border-color: var(--primary);
      box-shadow: 0 0 40px rgba(79, 70, 229, 0.4);
      transform: scale(1.05);
    }

    .agent-is-speaking .waveform span {
      animation: bounce 0.5s infinite alternate;
    }

    .agent-is-listening .waveform span {
      animation: listen-pulse 1.5s infinite;
    }

    .waveform {
      display: flex;
      gap: 4px;
      height: 30px;
      align-items: center;
    }

    .waveform span {
      width: 4px;
      border-radius: 2px;
      background: var(--primary);
      display: inline-block;
      transition: height 0.1s;
    }

    .waveform span:nth-child(1) {
      height: 10px;
      animation-delay: 0.1s;
    }

    .waveform span:nth-child(2) {
      height: 20px;
      animation-delay: 0.2s;
    }

    .waveform span:nth-child(3) {
      height: 30px;
      animation-delay: 0.3s;
    }

    .waveform span:nth-child(4) {
      height: 15px;
      animation-delay: 0.4s;
    }

    .waveform span:nth-child(5) {
      height: 25px;
      animation-delay: 0.5s;
    }

    @keyframes bounce {
      0% {
        height: 10px;
      }

      100% {
        height: 30px;
      }
    }

    @keyframes listen-pulse {

      0%,
      100% {
        height: 8px;
        opacity: 0.5;
      }

      50% {
        height: 12px;
        opacity: 1;
      }
    }

    .agent-name-tag {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .active-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .call-controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--surface-color);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      color: white;
      transition: all 0.2s;
      font-size: 1.2rem;
    }

    .btn-call {
      background: var(--primary);
    }

    .btn-call:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-end {
      background: var(--danger);
    }

    .btn-end:hover:not(:disabled) {
      filter: brightness(1.1);
    }

    .btn-mic {
      background: var(--surface-light);
      border: 1px solid var(--border);
    }

    .btn-mic:hover:not(:disabled) {
      background: #333845;
    }

    .icon-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Right side - Transcript Area */
    .sidebar {
      flex: 1;
      background: var(--surface-color);
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 320px;
    }

    .sidebar-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .transcript-box {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* WebKit Scrollbar styling */
    .transcript-box::-webkit-scrollbar {
      width: 6px;
    }

    .transcript-box::-webkit-scrollbar-track {
      background: transparent;
    }

    .transcript-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      animation: slideIn 0.3s ease forwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message .sender {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .message .bubble {
      padding: 0.8rem 1rem;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 90%;
    }

    .msg-agent {
      align-items: flex-start;
    }

    .msg-agent .bubble {
      background: #23223f;
      border: 1px solid #373369;
      border-top-left-radius: 4px;
    }

    .msg-user {
      align-items: flex-end;
    }

    .msg-user .bubble {
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }

    .msg-system {
      align-items: center;
      margin: 1rem 0;
    }

    .msg-system .bubble {
      background: transparent;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 0;
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="22"></line>
      </svg>
      Live<span>Interview</span>
    </div>
    <div class="header-controls">
      <div class="status-badge" id="statusBadge">
        <div class="status-dot"></div>
        <span id="headerStatusText">Offline</span>
      </div>
    </div>
  </header>

  <div class="workspace">
    <div class="stage">
      <div class="video-container" id="videoContainer">
        <div class="agent-name-tag">
          <div class="active-indicator" id="agentIndicator" style="opacity: 0.5; background: var(--text-muted);"></div>
          Vighnarth Nile (Candidate)
        </div>

        <div class="avatar-display" id="avatarDisplay">
          <div class="avatar-circle">VN</div>
          <div class="waveform" id="waveform">
            <span style="height: 4px;"></span><span style="height: 4px;"></span>
            <span style="height: 4px;"></span><span style="height: 4px;"></span>
            <span style="height: 4px;"></span>
          </div>
          <p id="agentStatusText" style="color: var(--text-muted); font-size: 0.9rem;">Ready to start interview...</p>
        </div>
      </div>

      <div class="call-controls">
        <button class="icon-btn btn-call" id="btnStart" onclick="startInterview()" title="Start Interview">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
            </path>
          </svg>
        </button>
        <button class="icon-btn btn-mic" id="btnMic" disabled title="Microphone Active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
          </svg>
        </button>
        <button class="icon-btn btn-end" id="btnEnd" onclick="endInterview()" disabled title="Leave Interview">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91">
            </path>
            <line x1="23" y1="1" x2="1" y2="23"></line>
          </svg>
        </button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        Live Transcript
      </div>
      <div class="transcript-box" id="transcript">
        <div class="message msg-system">
          <div class="bubble">Click the phone icon to join the interview room. Note: You must allow microphone
            permissions.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- LiveKit Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>

  <script>
    let room = null;

    function updateGlobalStatus(text, isConnected) {
      document.getElementById("headerStatusText").textContent = text;
      const badge = document.getElementById("statusBadge");
      if (isConnected) badge.classList.add("connected");
      else badge.classList.remove("connected");
    }

    function updateAgentState(state, desc) {
      const container = document.getElementById("videoContainer");
      const statusTxt = document.getElementById("agentStatusText");
      const indicator = document.getElementById("agentIndicator");

      container.classList.remove("agent-is-speaking", "agent-is-listening");
      indicator.style.background = "var(--text-muted)";
      indicator.style.opacity = "0.5";

      statusTxt.textContent = desc;

      if (state === "speaking") {
        container.classList.add("agent-is-speaking");
        indicator.style.background = "var(--primary)";
        indicator.style.opacity = "1";
      } else if (state === "listening") {
        container.classList.add("agent-is-listening");
        indicator.style.background = "var(--success)";
        indicator.style.opacity = "1";
      }
    }

    function appendMessage(sender, text) {
      const box = document.getElementById("transcript");
      const msgObj = document.createElement("div");

      if (sender === "system") {
        msgObj.className = "message msg-system";
        msgObj.innerHTML = `<div class="bubble">${text}</div>`;
      } else if (sender === "agent") {
        msgObj.className = "message msg-agent";
        msgObj.innerHTML = `<span class="sender">Vighnarth Nile</span><div class="bubble">${text}</div>`;
      } else {
        msgObj.className = "message msg-user";
        msgObj.innerHTML = `<span class="sender">You (Interviewer)</span><div class="bubble">${text}</div>`;
      }

      box.appendChild(msgObj);
      box.scrollTop = box.scrollHeight;
    }

    async function startInterview() {
      const btnStart = document.getElementById("btnStart");
      const btnEnd = document.getElementById("btnEnd");
      const btnMic = document.getElementById("btnMic");

      btnStart.disabled = true;
      updateGlobalStatus("Connecting to Room...", false);
      updateAgentState("connecting", "Establishing secure connection...");

      try {
        appendMessage("system", "Authenticating...");
        const res = await fetch("/token?room=interview-room&identity=interviewer");
        if (!res.ok) throw new Error("Failed to get token from server.");
        const { token, url } = await res.json();

        appendMessage("system", "Connecting to LiveKit backend...");
        room = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
          if (track.kind === "audio" && participant.identity !== "interviewer") {
            const audioEl = track.attach();
            document.body.appendChild(audioEl);

            updateAgentState("speaking", "Divya is speaking...");

            track.on("ended", () => {
              updateAgentState("listening", "Listening to you...");
            });
          }
        });

        room.on(LivekitClient.RoomEvent.DataReceived, (payload) => {
          try {
            const data = JSON.parse(new TextDecoder().decode(payload));
            if (data.type === "transcript") {
              appendMessage(data.speaker === "agent" ? "agent" : "user", data.text);
            }
          } catch (_) { }
        });

        room.on(LivekitClient.RoomEvent.ParticipantConnected, (p) => {
          if (p.identity !== "interviewer") {
            updateAgentState("listening", "Listening to your audio...");
            appendMessage("system", "Candidate has joined the room.");
          }
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          endInterview(true);
        });

        await room.connect(url, token);
        updateGlobalStatus("Connected", true);

        // CRITICAL: Request microphone permissions and publish audio track!
        appendMessage("system", "Initializing your microphone...");
        try {
          await room.localParticipant.setMicrophoneEnabled(true);
          btnMic.disabled = false;
        } catch (micErr) {
          appendMessage("system", "Warning: Microphone access denied or no mic found. The agent will not hear you.");
          console.error("Mic error:", micErr);
        }

        // Dispatch agent worker
        updateAgentState("connecting", "Pinging Agent Worker...");
        await fetch("/dispatch?room=interview-room", { method: "POST" });

        btnEnd.disabled = false;
        appendMessage("system", "Interview session is live.");
        updateAgentState("listening", "Waiting for agent greeting...");

      } catch (err) {
        console.error(err);
        updateGlobalStatus("Connection Failed", false);
        updateAgentState("offline", "System Failure");
        appendMessage("system", "Error: " + err.message);
        btnStart.disabled = false;
      }
    }

    async function endInterview(fromEvent = false) {
      if (room) {
        await room.disconnect();
        room = null;
      }
      updateGlobalStatus("Offline", false);
      updateAgentState("offline", "Interview Concluded.");
      document.getElementById("btnStart").disabled = false;
      document.getElementById("btnEnd").disabled = true;
      document.getElementById("btnMic").disabled = true;
      if (!fromEvent) {
        appendMessage("system", "You disconnected from the interview.");
      }
    }
  </script>
</body>

</html>
